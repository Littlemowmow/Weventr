            "@type": "Answer",
            "text": "Most travel apps focus on booking flights and hotels. Weventr focuses on the part nobody else solves — the messy group coordination that happens before you book anything. Budget debates, destination voting, splitting costs fairly. We turn chaotic group chats into an organized trip plan everyone agrees on. And unlike a booking app, we don't care where you book — we just make sure your group actually agrees before you do."
          }
        },
        {
          "@type": "Question",
          "name": "What if my friends always flake?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "That's literally why we built this. Weventr has voting deadlines, budget locks, and shared itineraries that make it harder for anyone to quietly back out. When everyone can see who's voted, who's committed, and what it costs — the 'let me check with work' excuse loses its power. We can't fix your flaky friend, but we can make it really obvious when they're flaking."
          }
        },
        {
          "@type": "Question",
          "name": "Why not just use a spreadsheet or group chat?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Because spreadsheets don't handle disagreements, and group chats bury decisions under 200 unread messages. Weventr gives your group a structured way to vote on destinations, set budgets together, and track who owes what — without anyone having to play \"trip coordinator.\" Plus, be honest — when's the last time everyone actually opened the Google Doc?"
          }
        },
        {
          "@type": "Question",

            "text": "Yes, but not in a gimmicky way. Weventr uses AI to surface hidden gems and local recommendations you won't find on the first page of Google. Think of it as a local friend who knows every city — not a chatbot that plans your trip for you."
          }
        },

          "acceptedAnswer": {

          "name": "Who's building Weventr?",
