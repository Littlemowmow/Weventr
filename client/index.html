        {
          "@type": "Question",
          "name": "Why SideQuest? What makes it different?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most travel apps focus on booking flights and hotels. SideQuest focuses on the part nobody else solves — the messy group coordination that happens before you book anything. Budget debates, destination voting, splitting costs fairly. We turn chaotic group chats into an organized trip plan everyone agrees on."
          }
        },
        {
          "@type": "Question",
          "name": "Isn't this just another travel booking app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Not at all. SideQuest doesn't book anything for you. We help your group agree on where to go, set a realistic budget, vote on activities, and split expenses — all the planning chaos that happens in your group chat right now. Once your group is aligned, you book however you prefer."
          }
        },
        {
          "@type": "Question",
          "name": "Why not just use a spreadsheet or group chat?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Because spreadsheets don't handle disagreements, and group chats bury decisions under 200 unread messages. SideQuest gives your group a structured way to vote on destinations, set budgets together, and track who owes what — without anyone having to play \"trip coordinator.\""
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI actually help with planning?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SideQuest's AI reads your group chat chaos and extracts the useful stuff — suggested destinations, budget preferences, date conflicts, activity ideas. It turns scattered opinions into organized options your group can actually vote on, so nobody has to manually sort through hundreds of messages."
          }
        },
        {
          "@type": "Question",
          "name": "Does everyone in the group need the app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ideally, yes — so everyone can vote and contribute to the plan. But you can share a read-only view of the itinerary with anyone, so even friends who haven't downloaded it can stay in the loop."
          }
        },
        {
          "@type": "Question",
          "name": "Is SideQuest free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Joining the waitlist is completely free. When we open the beta, early supporters get exclusive founding pricing that locks in permanently. We'll share all the details with the waitlist before anyone else."
          }
        },
        {
          "@type": "Question",
          "name": "Who's building SideQuest?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We're college students at the University of Michigan who got tired of watching amazing trip ideas die in our group chats. We built SideQuest because we needed it ourselves."
          }
        },
